<!doctype html>
<html lang="de">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Dr. Dosis — Play (Direction D: Cool &amp; Modern)</title>
<style>
  :root {
    --bg0:#0b1020; --bg1:#161f3d;
    --surface:rgba(255,255,255,0.05); --surface2:rgba(255,255,255,0.08);
    --border:rgba(255,255,255,0.12);
    --text:#e8edff; --dim:#9aa6c9;
    --green:#38e0a0; --green-soft:rgba(56,224,160,0.18); --green-line:rgba(56,224,160,0.8);
    --water-top:#4cc9f0; --water-bot:#7c5cff;
    --grape:#ffb703; --toxic:#ff6b7a;
    --shadow:0 18px 50px rgba(0,0,0,.5);
  }
  *{box-sizing:border-box;margin:0;font-family:ui-sans-serif,system-ui,'Segoe UI',Roboto,sans-serif}
  html,body{width:1280px;height:720px;overflow:hidden}
  body{background:radial-gradient(1200px 700px at 50% -8%,var(--bg1),var(--bg0));color:var(--text);
       padding:26px 38px;display:flex;flex-direction:column;gap:18px}

  /* top bar */
  .top{display:flex;align-items:center;justify-content:space-between}
  .who{display:flex;align-items:center;gap:14px}
  .pill{background:var(--surface);border:1px solid var(--border);border-radius:999px;
        padding:7px 14px;font-size:14px;color:var(--dim)}
  .who h1{font-size:24px;font-weight:700;letter-spacing:.3px}
  .who h1 span{color:var(--dim);font-weight:500;font-size:18px}
  .right{display:flex;align-items:center;gap:18px}
  .stars{font-size:24px;letter-spacing:3px}
  .timer{font-variant-numeric:tabular-nums;font-size:22px;font-weight:700;
         background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:6px 14px}

  /* event banner */
  .banner{align-self:center;display:flex;align-items:center;gap:12px;
          background:linear-gradient(90deg,rgba(255,183,3,.22),rgba(255,183,3,.08));
          border:1px solid rgba(255,183,3,.5);border-radius:16px;padding:12px 22px;
          font-size:20px;font-weight:600;box-shadow:0 8px 30px rgba(255,183,3,.15)}
  .banner .big{font-size:26px}

  /* stage */
  .stage{flex:1;display:grid;grid-template-columns:1.05fr .95fr;gap:40px;align-items:center;min-height:0}

  /* patient card */
  .patient{background:var(--surface);border:1px solid var(--border);border-radius:24px;
           padding:26px;display:flex;flex-direction:column;align-items:center;gap:14px;box-shadow:var(--shadow)}
  .face{width:128px;height:128px}
  .pname{font-size:26px;font-weight:700}
  .wb{width:100%;}
  .wb .lbl{font-size:13px;color:var(--dim);text-transform:uppercase;letter-spacing:.6px;margin-bottom:6px}
  .wb .bar{height:16px;border-radius:999px;background:var(--surface2);overflow:hidden;border:1px solid var(--border)}
  .wb .fill{height:100%;width:74%;border-radius:999px;background:linear-gradient(90deg,var(--green),#8be0c0)}
  .status{font-size:19px;font-weight:600;color:var(--green)}
  .status span{color:var(--dim);font-weight:500}

  /* gauge */
  .gaugewrap{display:flex;flex-direction:column;align-items:center;gap:12px}
  .gaugewrap .title{font-size:14px;color:var(--dim);text-transform:uppercase;letter-spacing:.8px}
  .gauge{position:relative;width:150px;height:360px;border-radius:60px;
         background:linear-gradient(160deg,rgba(255,255,255,.10),rgba(255,255,255,.02));
         border:2px solid var(--border);overflow:hidden;box-shadow:var(--shadow)}
  .band{position:absolute;left:0;right:0;top:35%;height:25%;background:var(--green-soft);
        border-top:2px dashed var(--green-line);border-bottom:2px dashed var(--green-line)}
  .water{position:absolute;left:0;right:0;bottom:0;height:53%;
         background:linear-gradient(180deg,var(--water-top),var(--water-bot))}
  .water::before{content:"";position:absolute;top:-9px;left:0;right:0;height:18px;border-radius:50%;
                 background:var(--water-top);opacity:.85}
  .marker{position:absolute;left:0;right:0;bottom:53%;display:flex;justify-content:flex-end;align-items:center;}
  .marker .v{transform:translateY(-50%);background:#fff;color:#0b1020;font-weight:800;font-size:14px;
             border-radius:8px;padding:2px 8px;margin-right:-6px;box-shadow:0 4px 12px rgba(0,0,0,.4)}
  .glow{filter:drop-shadow(0 0 18px rgba(56,224,160,.55))}

  /* hold button */
  .holdwrap{display:flex;justify-content:center;padding-top:6px}
  .hold{display:flex;align-items:center;gap:16px;
        background:linear-gradient(135deg,var(--water-top),var(--water-bot));
        border:none;border-radius:22px;padding:22px 56px;color:#fff;font-size:24px;font-weight:800;
        box-shadow:0 14px 40px rgba(76,201,240,.35);cursor:pointer}
  .hold .dot{width:30px;height:30px;border-radius:50%;background:rgba(255,255,255,.9);
             box-shadow:0 0 0 8px rgba(255,255,255,.18)}
  .hold small{display:block;font-size:13px;font-weight:500;opacity:.85;letter-spacing:.3px}
</style>
</head>
<body>
  <div class="top">
    <div class="who">
      <span class="pill">Patient 2/3</span>
      <h1>Eva <span>· Mama · Cholesterin</span></h1>
    </div>
    <div class="right">
      <div class="stars">⭐⭐☆</div>
      <div class="timer">0:42</div>
    </div>
  </div>

  <div class="banner"><span class="big">🍊</span> Eva trinkt Grapefruitsaft!</div>

  <div class="stage">
    <div class="patient">
      <svg class="face" viewBox="0 0 100 100" aria-hidden="true">
        <circle cx="50" cy="50" r="46" fill="rgba(56,224,160,.14)" stroke="var(--green)" stroke-width="3"/>
        <circle cx="37" cy="44" r="6" fill="var(--text)"/>
        <circle cx="63" cy="44" r="6" fill="var(--text)"/>
        <path d="M34 60 q16 16 32 0" fill="none" stroke="var(--text)" stroke-width="5" stroke-linecap="round"/>
      </svg>
      <div class="pname">Eva</div>
      <div class="wb">
        <div class="lbl">Wohlbefinden</div>
        <div class="bar"><div class="fill"></div></div>
      </div>
      <div class="status">Im grünen Bereich! <span>· 18 s</span></div>
    </div>

    <div class="gaugewrap">
      <div class="title">Wirkstoff-Spiegel</div>
      <div class="gauge glow">
        <div class="band"></div>
        <div class="water"></div>
        <div class="marker"><span class="v">52</span></div>
      </div>
    </div>
  </div>

  <div class="holdwrap">
    <button class="hold"><span class="dot"></span>
      <span>HALTEN<small>zum Dosieren</small></span>
    </button>
  </div>
</body>
</html>
